<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="calculator" role="application" aria-label="Calculator">
        <output id="display" aria-live="polite" aria-atomic="true">0</output>
        <div class="buttons" role="group" aria-label="Calculator buttons">
            <button type="button" class="button span-two" data-action="clear" aria-label="Clear">C</button>
            <button type="button" class="button" data-action="backspace" aria-label="Backspace">⌫</button>
            <button type="button" class="button operator" data-value="%" aria-label="Modulo">%</button>
            <button type="button" class="button operator" data-value="/" aria-label="Divide">÷</button>
            
            <button type="button" class="button" data-value="7" aria-label="7">7</button>
            <button type="button" class="button" data-value="8" aria-label="8">8</button>
            <button type="button" class="button" data-value="9" aria-label="9">9</button>
            <button type="button" class="button operator" data-value="*" aria-label="Multiply">×</button>
            
            <button type="button" class="button" data-value="4" aria-label="4">4</button>
            <button type="button" class="button" data-value="5" aria-label="5">5</button>
            <button type="button" class="button" data-value="6" aria-label="6">6</button>
            <button type="button" class="button operator" data-value="-" aria-label="Subtract">−</button>
            
            <button type="button" class="button" data-value="1" aria-label="1">1</button>
            <button type="button" class="button" data-value="2" aria-label="2">2</button>
            <button type="button" class="button" data-value="3" aria-label="3">3</button>
            <button type="button" class="button operator" data-value="+" aria-label="Add">+</button>
            
            <button type="button" class="button span-two" data-value="0" aria-label="0">0</button>
            <button type="button" class="button" data-value="." aria-label="Decimal point">.</button>
            <button type="button" class="button equals" data-action="equals" aria-label="Equals">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
